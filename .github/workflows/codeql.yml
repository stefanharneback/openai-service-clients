name: codeql

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "27 3 * * 1"
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze-javascript:
    if: ${{ !github.event.repository.private || vars.ENABLE_CODEQL == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
          queries: security-extended,security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Analyze
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:javascript-typescript"

  analyze-csharp:
    if: ${{ !github.event.repository.private || vars.ENABLE_CODEQL == 'true' }}
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "9.0.x"

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: csharp
          queries: security-extended,security-and-quality

      - name: Restore
        run: dotnet restore OpenAiServiceClients.slnx

      - name: Build non-MAUI projects
        run: |
          dotnet build dotnet/src/Core/OpenAiServiceClients.Core.csproj --no-restore
          dotnet build dotnet/src/Web/OpenAiServiceClients.Web.csproj --no-restore

      - name: Analyze
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:csharp"
