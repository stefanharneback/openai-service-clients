<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenAI Service Clients - .NET Web</title>
    <style>
      body { font-family: Segoe UI, Arial, sans-serif; margin: 0; background: #f4f8ff; }
      main { max-width: 900px; margin: 3rem auto; background: #fff; border: 1px solid #d7e1ff; border-radius: 14px; padding: 1.25rem; }
      input, textarea, button { width: 100%; box-sizing: border-box; margin-top: 0.4rem; margin-bottom: 0.9rem; }
      input, textarea { padding: 0.65rem; border: 1px solid #b8c9ff; border-radius: 8px; }
      button { padding: 0.65rem; border: none; border-radius: 8px; background: #1f5ad8; color: #fff; cursor: pointer; }
      pre { background: #f4f7ff; border-radius: 8px; padding: 0.8rem; overflow: auto; }
      .row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    </style>
  </head>
  <body>
    <main>
      <h1>.NET Web Client</h1>
      <p>Calls this app's backend endpoints which use the shared Core gateway client.</p>

      <button id="healthBtn">Check /api/health</button>
      <pre id="healthResult">No health result yet.</pre>

      <h2>LLM</h2>
      <div class="row">
        <div>
          <label for="apiKey">Client API key</label>
          <input id="apiKey" type="password" />
        </div>
        <div>
          <label for="model">Model</label>
          <input id="model" value="gpt-5.4-mini" />
        </div>
      </div>

      <label for="input">Input</label>
      <textarea id="input" rows="5">Summarize the value of API gateways in three bullets.</textarea>

      <button id="llmBtn">Send /api/llm</button>
      <button id="llmStreamBtn">Stream /api/llm/stream</button>
      <pre id="llmResult">No LLM result yet.</pre>

      <h2>Whisper</h2>
      <div class="row">
        <div>
          <label for="whisperApiKey">Client API key</label>
          <input id="whisperApiKey" type="password" />
        </div>
        <div>
          <label for="whisperModel">Model</label>
          <input id="whisperModel" value="whisper-1" />
        </div>
      </div>

      <label for="whisperFile">Audio file</label>
      <input id="whisperFile" type="file" accept="audio/*,.mp3,.mp4,.wav,.m4a,.webm,.ogg,.flac,.aac" />

      <button id="whisperBtn">Transcribe /api/whisper</button>
      <pre id="whisperResult">No transcription result yet.</pre>

      <h2>Usage</h2>
      <div>
          <label for="usageApiKey">Client API key</label>
          <input id="usageApiKey" type="password" />
      </div>
      <div>
          <label for="usageLimit">Limit</label>
          <input id="usageLimit" type="number" value="20" min="1" max="100" />
          <label for="usageOffset">Offset</label>
          <input id="usageOffset" type="number" value="0" min="0" />
      </div>
      <button id="usageBtn">Get /api/usage</button>
      <pre id="usageResult">No usage result yet.</pre>

      <h2>Admin Usage</h2>
      <div>
          <label for="adminUsageKey">Admin key</label>
          <input id="adminUsageKey" type="password" />
      </div>
      <div>
          <label for="adminLimit">Limit</label>
          <input id="adminLimit" type="number" value="20" min="1" max="100" />
          <label for="adminOffset">Offset</label>
          <input id="adminOffset" type="number" value="0" min="0" />
      </div>
      <button id="adminUsageBtn">Get /api/admin/usage</button>
      <pre id="adminUsageResult">No admin usage result yet.</pre>
    </main>

    <script>
      const healthBtn = document.getElementById("healthBtn");
      const llmBtn = document.getElementById("llmBtn");
      const llmStreamBtn = document.getElementById("llmStreamBtn");
      const whisperBtn = document.getElementById("whisperBtn");
      const usageBtn = document.getElementById("usageBtn");
      const adminUsageBtn = document.getElementById("adminUsageBtn");
      const healthResult = document.getElementById("healthResult");
      const llmResult = document.getElementById("llmResult");
      const whisperResult = document.getElementById("whisperResult");
      const usageResult = document.getElementById("usageResult");
      const adminUsageResult = document.getElementById("adminUsageResult");

      const parseSseDataLine = (line) => {
        if (!line.startsWith("data:")) {
          return null;
        }

        return line.slice(5).trim();
      };

      const extractDisplayChunk = (data) => {
        if (data === "[DONE]") {
          return "\n\n[done]";
        }

        try {
          const payload = JSON.parse(data);
          if (typeof payload.delta === "string") {
            return payload.delta;
          }

          if (payload.type === "response.completed") {
            return "\n\n[completed]";
          }

          return "";
        } catch {
          return `${data}\n`;
        }
      };

      healthBtn.addEventListener("click", async () => {
        healthResult.textContent = "Loading...";
        try {
          const response = await fetch("/api/health");
          const payload = await response.json();
          healthResult.textContent = JSON.stringify(payload, null, 2);
        } catch (error) {
          healthResult.textContent = String(error);
        }
      });

      llmBtn.addEventListener("click", async () => {
        llmResult.textContent = "Loading...";

        const payload = {
          apiKey: document.getElementById("apiKey").value,
          model: document.getElementById("model").value,
          input: document.getElementById("input").value,
        };

        try {
          const response = await fetch("/api/llm", {
            method: "POST",
            headers: { "content-type": "application/json" },
            body: JSON.stringify(payload),
          });

          const text = await response.text();
          llmResult.textContent = text;
        } catch (error) {
          llmResult.textContent = String(error);
        }
      });

      llmStreamBtn.addEventListener("click", async () => {
        llmResult.textContent = "Streaming output:\n\n";

        const payload = {
          apiKey: document.getElementById("apiKey").value,
          model: document.getElementById("model").value,
          input: document.getElementById("input").value,
        };

        try {
          const response = await fetch("/api/llm/stream", {
            method: "POST",
            headers: { "content-type": "application/json", accept: "text/event-stream" },
            body: JSON.stringify(payload),
          });

          if (!response.ok) {
            const text = await response.text();
            throw new Error(text || `Streaming request failed with status ${response.status}`);
          }

          if (!response.body) {
            throw new Error("Streaming response body was empty.");
          }

          const reader = response.body.getReader();
          const decoder = new TextDecoder();
          let buffer = "";

          while (true) {
            const { value, done } = await reader.read();
            if (done) {
              break;
            }

            buffer += decoder.decode(value, { stream: true });
            const lines = buffer.split(/\r?\n/);
            buffer = lines.pop() ?? "";

            for (const line of lines) {
              const data = parseSseDataLine(line);
              if (!data) {
                continue;
              }

              const chunk = extractDisplayChunk(data);
              if (chunk.length > 0) {
                llmResult.textContent += chunk;
              }
            }
          }
        } catch (error) {
          llmResult.textContent += `\n\n${String(error)}`;
        }
      });

      whisperBtn.addEventListener("click", async () => {
        const file = document.getElementById("whisperFile").files?.[0];
        if (!file) {
          whisperResult.textContent = "Please select an audio file.";
          return;
        }

        whisperResult.textContent = "Transcribing...";

        const formData = new FormData();
        formData.append("apiKey", document.getElementById("whisperApiKey").value);
        formData.append("model", document.getElementById("whisperModel").value);
        formData.append("file", file, file.name);

        try {
          const response = await fetch("/api/whisper", {
            method: "POST",
            body: formData,
          });

          const text = await response.text();
          whisperResult.textContent = text;
        } catch (error) {
          whisperResult.textContent = String(error);
        }
      });
      usageBtn.addEventListener("click", async () => {
        usageResult.textContent = "Loading...";
        const apiKey = document.getElementById("usageApiKey").value;
        const limit = document.getElementById("usageLimit").value;
        const offset = document.getElementById("usageOffset").value;
        try {
          const response = await fetch(`/api/usage?apiKey=${encodeURIComponent(apiKey)}&limit=${limit}&offset=${offset}`);
          const payload = await response.json();
          usageResult.textContent = JSON.stringify(payload, null, 2);
        } catch (error) {
          usageResult.textContent = String(error);
        }
      });

      adminUsageBtn.addEventListener("click", async () => {
        adminUsageResult.textContent = "Loading...";
        const adminKey = document.getElementById("adminUsageKey").value;
        const limit = document.getElementById("adminLimit").value;
        const offset = document.getElementById("adminOffset").value;
        try {
          const response = await fetch(`/api/admin/usage?adminKey=${encodeURIComponent(adminKey)}&limit=${limit}&offset=${offset}`);
          const payload = await response.json();
          adminUsageResult.textContent = JSON.stringify(payload, null, 2);
        } catch (error) {
          adminUsageResult.textContent = String(error);
        }
      });
    </script>
  </body>
</html>
